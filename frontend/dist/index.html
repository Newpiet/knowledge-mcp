<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeelin 农业 — 农业专属大模型知识中枢</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
:root{
  --bg:#fdfcf9;--ink:#2f3630;--muted:#7b857d;--line:#e6e5dd;
  --panel:#ffffff;--accent:#789980;--accent-hover:#5d7d65;
  --accent-light:#eef2ef;--accent-ink:#ffffff;
  --danger:#d97878;--danger-light:#fbecec;
  --warn:#b5850b;--warn-light:#fff9e6;
  --shadow-sm:0 4px 16px rgba(47,54,48,.04);
  --shadow-md:0 12px 32px rgba(47,54,48,.06);
  --shadow-lg:0 24px 64px rgba(47,54,48,.08);
  --radius-sm:12px;--radius-md:20px;--radius-lg:28px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;color:var(--ink);background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Outfit','Inter',sans-serif;letter-spacing:-.01em}
.container{max-width:1240px;margin:0 auto;padding:0 32px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:40px;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;border:1px solid transparent;cursor:pointer;transition:all .22s cubic-bezier(.2,.8,.2,1);text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--accent);color:var(--accent-ink)}.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 6px 18px rgba(120,153,128,.28)}.btn-primary:disabled{background:var(--muted);opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:var(--panel);color:var(--ink);border-color:var(--line);box-shadow:var(--shadow-sm)}.btn-secondary:hover{background:var(--accent-light);border-color:rgba(120,153,128,.3);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted);border-color:transparent}.btn-ghost:hover{background:var(--accent-light);color:var(--accent)}
.btn-danger{background:var(--danger-light);color:var(--danger);border-color:transparent}.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{padding:6px 14px;font-size:13px}.btn-lg{padding:13px 32px;font-size:15px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px}

/* Panels */
.glass-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}
.hover-card{transition:all .3s cubic-bezier(.2,.8,.2,1);cursor:pointer}
.hover-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);border-color:rgba(120,153,128,.35)!important}

/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.animate-slide-up{animation:slideUp .5s cubic-bezier(.16,1,.3,1) forwards}
.animate-fade-in{animation:fadeIn .4s ease forwards}
.spinner{width:14px;height:14px;border:2px solid rgba(120,153,128,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s ease-in-out infinite;flex-shrink:0}
.spinner-lg{width:20px;height:20px;border-width:2.5px}

/* Forms */
.form-input{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:12px 16px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .18s,box-shadow .18s;background:#fff;color:var(--ink)}.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(120,153,128,.1)}.form-input::placeholder{color:#b0b8b2}
textarea.form-input{min-height:84px;resize:vertical;line-height:1.6}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:7px}.form-label .opt{font-size:12px;color:var(--muted);font-weight:400}
.form-group{margin-bottom:18px}

/* Header */
.header{background:rgba(253,252,249,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(230,229,221,.6);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{font-size:26px;line-height:1}
.brand-name{font-size:18px;font-weight:800;color:var(--ink);font-family:'Outfit',sans-serif}
.brand-sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}

/* Upload zone */
.upload-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px dashed var(--accent);border-radius:20px;padding:36px 24px;text-align:center;cursor:pointer;background:var(--accent-light);transition:.2s;position:relative}
.upload-zone:hover,.upload-zone.dragover{background:#e2ebd6;border-color:var(--accent-hover)}
.upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}

/* File list */
.file-item{display:flex;align-items:center;gap:14px;padding:13px 16px;background:#fff;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.03);margin-bottom:8px;transition:.2s}
.file-item.status-failed{border-left-color:var(--danger)}
.file-item.status-queued,.file-item.status-processing{border-left-color:var(--warn)}
.file-icon{width:36px;height:36px;flex-shrink:0;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);font-size:15px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:40px;font-weight:600}
.badge-completed,.badge-active{background:#eef5f1;color:var(--accent)}
.badge-processing{background:var(--warn-light);color:var(--warn);animation:pulse 1.8s ease-in-out infinite}
.badge-queued{background:#f3f4f6;color:var(--muted);animation:pulse 2s ease-in-out infinite}
.badge-failed{background:var(--danger-light);color:var(--danger)}
.badge-pending{background:#f3f4f6;color:var(--muted)}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(47,54,48,.55);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-body{background:#fff;border-radius:28px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.16)}

/* Code block */
.code-block{background:#f6f7f5;border:1px solid var(--line);border-radius:12px;padding:16px;font-family:'SF Mono',Monaco,'Cascadia Code',monospace;font-size:12.5px;line-height:1.7;color:var(--ink);overflow-x:auto;position:relative;white-space:pre}
.copy-btn{position:absolute;top:10px;right:10px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:.18s;font-family:'Inter',sans-serif}
.copy-btn:hover{background:var(--accent-light);color:var(--accent);border-color:rgba(120,153,128,.3)}
.copy-btn.copied{background:var(--accent-light);color:var(--accent)}

/* Search result */
.search-result{margin-top:14px;padding:18px;background:#fafaf8;border:1px solid var(--line);border-radius:14px;font-size:14px;line-height:1.85;white-space:pre-wrap;max-height:460px;overflow-y:auto;color:var(--ink)}

/* Toast */
.toast-container{position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:14px;background:#fff;box-shadow:0 8px 28px rgba(0,0,0,.12);border:1px solid var(--line);pointer-events:auto;min-width:260px;max-width:380px;font-size:13.5px;font-weight:500}
.toast.error{border-left:3px solid var(--danger)}
.toast.success{border-left:3px solid var(--accent)}

/* KB Grid */
.kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}

/* Stat row */
.stat-row{display:flex;align-items:center;gap:0;padding:16px 0;border-top:1px solid var(--line);margin-top:16px}
.stat-item{display:flex;flex-direction:column;gap:2px;padding:0 20px;flex:1}
.stat-item:first-child{padding-left:0}
.stat-divider{width:1px;height:32px;background:var(--line)}
.stat-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.03em}
.stat-value{font-size:20px;font-weight:700;font-family:'Outfit',sans-serif}

/* Inline confirm */
.confirm-inline{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--danger-light);border-radius:12px;font-size:13px;color:var(--danger)}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:3px}
.tab{padding:6px 14px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:.18s;border:none;background:none;font-family:'Inter',sans-serif}
.tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* Section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:17px;font-weight:700}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(123,133,125,.18);border-radius:3px}
    </style>
</head>
<body>
<div id="app"></div>
<div class="toast-container" id="toast-container"></div>

<script>
const API = '/api';
const ALLOWED_EXT = new Set(['.pdf','.txt','.md','.markdown','.rst','.docx','.doc','.pptx','.xlsx','.xls','.html','.csv','.tsv','.json','.rtf']);
let token = localStorage.getItem('yz_token');
let currentUser = null;
let authMode = 'login';

let page = 'dashboard';
let kbs = [];
let currentKB = null;
let docs = [];
let showCreateModal = false;
let queryMode = 'hybrid';
// doc_id -> EventSource (for SSE cleanup)
const sseMap = {};
// doc_id -> confirm pending
let confirmKBDelete = false;

// ─── Toast ───────────────────────────────────────────────────────────
let _tid = 0;
function toast(msg, type = 'success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast animate-slide-up ${type}`;
  const icon = type === 'error' ? '⚠' : '✓';
  t.innerHTML = `<span style="color:${type==='error'?'var(--danger)':'var(--accent)'};font-size:15px">${icon}</span><span style="flex:1">${esc(msg)}</span><button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:2px 4px;line-height:1">×</button>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3800);
}

// ─── API ─────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const h = { ...(opts.headers || {}) };
  if (token) h['Authorization'] = `Bearer ${token}`;
  if (!(opts.body instanceof FormData)) h['Content-Type'] = 'application/json';
  const res = await fetch(`${API}${path}`, { ...opts, headers: h });
  if (res.status === 401) { logout(); throw new Error('请重新登录'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || '请求失败');
  return data;
}

// ─── Auth ─────────────────────────────────────────────────────────────
function saveAuth(d) { token = d.token; localStorage.setItem('yz_token', token); currentUser = d; page = 'dashboard'; render(); }
function logout() { token = null; currentUser = null; localStorage.removeItem('yz_token'); page = 'dashboard'; render(); }
async function handleRegister(e) { e.preventDefault(); const b = e.target.querySelector('[type=submit]'); b.disabled = true; try { const d = await api('/auth/register', { method: 'POST', body: JSON.stringify({ username: e.target.username.value, password: e.target.password.value, display_name: e.target.display_name.value || null }) }); toast('注册成功，欢迎使用 Zeelin 农业'); saveAuth(d); } catch (err) { toast(err.message, 'error'); } finally { b.disabled = false; } }
async function handleLogin(e) { e.preventDefault(); const b = e.target.querySelector('[type=submit]'); b.disabled = true; try { const d = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username: e.target.username.value, password: e.target.password.value }) }); toast('登录成功'); saveAuth(d); } catch (err) { toast(err.message, 'error'); } finally { b.disabled = false; } }

// ─── KBs ─────────────────────────────────────────────────────────────
async function loadKBs() { try { kbs = await api('/knowledge-bases'); renderDashboardContent(); } catch (e) { console.error(e); } }
async function createKB(e) {
  e.preventDefault();
  const b = e.target.querySelector('[type=submit]'); b.disabled = true;
  try {
    const d = await api('/knowledge-bases', { method: 'POST', body: JSON.stringify({ name: e.target.kb_name.value, description: e.target.kb_desc.value || null, domain: e.target.kb_domain.value || '农业' }) });
    toast(`知识库「${d.name}」创建成功`); showCreateModal = false; renderCreateModal(); openKBDetail(d.id);
  } catch (err) { toast(err.message, 'error'); } finally { b.disabled = false; }
}
async function deleteKB(id, name) {
  try { await api(`/knowledge-bases/${id}`, { method: 'DELETE' }); toast(`知识库「${name}」已删除`); confirmKBDelete = false; page = 'dashboard'; render(); }
  catch (err) { toast(err.message, 'error'); confirmKBDelete = false; renderKBHeader(); }
}

// ─── KB Detail ────────────────────────────────────────────────────────
async function openKBDetail(id) {
  try { currentKB = await api(`/knowledge-bases/${id}`); page = 'detail'; confirmKBDelete = false; render(); }
  catch (err) { toast(err.message, 'error'); }
}
async function loadDocs() {
  if (!currentKB) return;
  try { docs = await api(`/knowledge-bases/${currentKB.id}/documents`); renderDocList(); }
  catch (e) { console.error(e); }
}

async function uploadFile(file) {
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  if (!ALLOWED_EXT.has(ext)) { toast(`不支持的文件类型: ${ext}`, 'error'); return; }
  const form = new FormData(); form.append('file', file);
  try {
    const doc = await api(`/knowledge-bases/${currentKB.id}/documents`, { method: 'POST', body: form });
    toast(`${file.name} 上传成功，正在排队处理…`);
    docs.unshift(doc); renderDocList();
    startSSE(doc.id);
  } catch (err) { toast('上传失败: ' + err.message, 'error'); }
}

function startSSE(docId) {
  if (sseMap[docId]) sseMap[docId].close();
  // EventSource doesn't support custom headers — pass token as query param
  const es = new EventSource(`${API}/knowledge-bases/${currentKB.id}/documents/${docId}/status?token=${encodeURIComponent(token)}`);
  es.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    const doc = docs.find(d => d.id === docId);
    if (doc) { doc.status = ev.status; if (ev.error) doc.error_message = ev.error; renderDocList(); }
    if (ev.status === 'completed' || ev.status === 'failed') { es.close(); delete sseMap[docId]; }
  };
  es.onerror = () => { es.close(); delete sseMap[docId]; };
  sseMap[docId] = es;
}

async function deleteDoc(id, name) {
  try { await api(`/knowledge-bases/${currentKB.id}/documents/${id}`, { method: 'DELETE' }); toast('文档已删除'); docs = docs.filter(d => d.id !== id); renderDocList(); }
  catch (err) { toast(err.message, 'error'); }
}

async function handleQuery(e) {
  e.preventDefault();
  const input = e.target.querySelector('input');
  const btn = e.target.querySelector('[type=submit]');
  if (!input.value.trim()) return;
  btn.disabled = true;
  const el = document.getElementById('search-result');
  el.style.display = 'block';
  el.innerHTML = '<div style="display:flex;align-items:center;gap:10px;color:var(--muted)"><div class="spinner spinner-lg"></div> 正在检索知识库…</div>';
  try {
    const d = await api(`/knowledge-bases/${currentKB.id}/query`, { method: 'POST', body: JSON.stringify({ query: input.value, mode: queryMode }) });
    el.textContent = d.answer;
  } catch (err) { el.innerHTML = `<span style="color:var(--danger)">查询失败: ${esc(err.message)}</span>`; }
  finally { btn.disabled = false; }
}

// ─── Render: Doc list ─────────────────────────────────────────────────
function renderDocList() {
  const el = document.getElementById('doc-list'); if (!el) return;
  const statsEl = document.getElementById('doc-stats');
  const total = docs.length;
  const completed = docs.filter(d => d.status === 'completed').length;
  const inProgress = docs.filter(d => d.status === 'processing' || d.status === 'queued').length;
  const failed = docs.filter(d => d.status === 'failed').length;
  if (statsEl) {
    statsEl.innerHTML = `
      <div class="stat-item"><span class="stat-label">文件总量</span><span class="stat-value" style="color:var(--ink)">${total}</span></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><span class="stat-label">已索引</span><span class="stat-value" style="color:var(--accent)">${completed}</span></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><span class="stat-label">处理中</span><span class="stat-value" style="color:var(--warn)">${inProgress}</span></div>
      ${failed > 0 ? `<div class="stat-divider"></div><div class="stat-item"><span class="stat-label">异常</span><span class="stat-value" style="color:var(--danger)">${failed}</span></div>` : ''}
    `;
  }
  if (total === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:36px 0;font-size:14px">暂无文档，请上传您的农业知识文件</div>'; return;
  }
  el.innerHTML = docs.map(d => `
    <div class="file-item status-${d.status}">
      <div class="file-icon">${fileIcon(d.original_name)}</div>
      <div style="flex:1;overflow:hidden">
        <div style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.original_name)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${formatSize(d.file_size)} · ${formatDate(d.created_at)}</div>
        ${d.status === 'failed' && d.error_message ? `<div style="font-size:11.5px;color:var(--danger);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(d.error_message)}">⚠ ${esc(d.error_message.slice(0, 80))}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span class="badge badge-${d.status}">
          ${d.status === 'processing' || d.status === 'queued' ? '<span class="spinner" style="width:10px;height:10px;margin-right:2px"></span>' : ''}
          ${statusText(d.status)}
        </span>
        <button class="btn btn-danger btn-sm" onclick="deleteDoc(${d.id},'${esc(d.original_name).replace(/'/g,"\\'")}')">删除</button>
      </div>
    </div>
  `).join('');

  // Auto-start SSE for any processing/queued docs not yet tracked
  docs.filter(d => d.status === 'processing' || d.status === 'queued').forEach(d => {
    if (!sseMap[d.id]) startSSE(d.id);
  });
}

// ─── Render: KB header (detail page) ─────────────────────────────────
function renderKBHeader() {
  const el = document.getElementById('kb-header-actions'); if (!el) return;
  if (confirmKBDelete) {
    el.innerHTML = `
      <div class="confirm-inline animate-fade-in">
        <span>确认删除？所有数据将永久清除</span>
        <button class="btn btn-sm" style="background:var(--danger);color:#fff;padding:5px 14px" onclick="deleteKB(${currentKB.id},'${esc(currentKB.name).replace(/'/g,"\\'")}')">确认删除</button>
        <button class="btn btn-ghost btn-sm" onclick="confirmKBDelete=false;renderKBHeader()">取消</button>
      </div>`;
  } else {
    el.innerHTML = `<button class="btn btn-secondary btn-sm" style="color:var(--danger);border-color:rgba(217,120,120,.3)" onclick="confirmKBDelete=true;renderKBHeader()">删除知识库</button>`;
  }
}

// ─── Render: Dashboard ────────────────────────────────────────────────
function renderDashboardContent() {
  const el = document.getElementById('kb-grid'); if (!el) return;
  const addBtn = document.getElementById('add-kb-btn');
  if (addBtn) addBtn.style.display = kbs.length > 0 ? '' : 'none';
  if (kbs.length === 0) {
    el.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:72px 20px">
        <div style="width:72px;height:72px;background:var(--accent-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px">📚</div>
        <h3 style="font-size:19px;font-weight:600;margin-bottom:10px">暂无知识库</h3>
        <p style="font-size:14px;color:var(--muted);margin-bottom:24px;max-width:360px;margin-left:auto;margin-right:auto">您还没有创建任何知识库，立即开始构建您的农业智库。</p>
        <button class="btn btn-primary btn-lg" onclick="showCreateModal=true;renderCreateModal()">＋ 新建知识空间</button>
      </div>`;
    return;
  }
  el.innerHTML = kbs.map(kb => {
    const hasActive = kb.total_files > kb.completed_files && kb.total_files > 0;
    return `
    <div class="glass-panel hover-card" onclick="openKBDetail(${kb.id})" style="padding:24px;display:flex;flex-direction:column;min-height:200px;border-radius:24px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">
        <div style="display:flex;gap:12px;align-items:center">
          <div style="width:44px;height:44px;border-radius:14px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:17px;font-weight:700;font-family:Outfit;flex-shrink:0">${kb.name.charAt(0).toUpperCase()}</div>
          <div>
            <h3 style="font-size:16px;font-weight:600;line-height:1.3">${esc(kb.name)}</h3>

          <form onsubmit="createKB(event)">

// ─── Render: MCP Config panel ─────────────────────────────────────────
let _mcpTab = 'json'; // 'json' | 'fields'
let _mcpExpanded = false; // collapsed by default

function renderMCPConfig() {
  return `
    <div class="glass-panel" style="border-radius:20px;margin-bottom:20px;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 22px;cursor:pointer;user-select:none" onclick="_mcpExpanded=!_mcpExpanded;renderMCPConfig_inplace()">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px">🔌</span>
          <div>
            <div style="font-size:15px;font-weight:700">MCP 全局接入</div>
            <div style="font-size:12.5px;color:var(--muted);margin-top:1px">一次配置，AI 自动访问您的所有知识库</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${_mcpExpanded ? `<div class="tabs" id="mcp-tabs">
            <button class="tab ${_mcpTab==='json'?'active':''}" onclick="event.stopPropagation();switchMCPTab('json')">JSON 配置</button>
            <button class="tab ${_mcpTab==='fields'?'active':''}" onclick="event.stopPropagation();switchMCPTab('fields')">字段配置</button>
          </div>` : ''}
          <span style="font-size:18px;color:var(--muted);transition:transform .2s;transform:rotate(${_mcpExpanded?'180':'0'}deg)">⌄</span>
        </div>
      </div>
      ${_mcpExpanded ? `<div style="padding:0 22px 20px" id="mcp-panel-body"></div>` : `<div id="mcp-panel-body"></div>`}
    </div>`;
}

function renderMCPConfig_inplace() {
  const panel = document.querySelector('[onclick*="renderMCPConfig_inplace"]')?.closest('.glass-panel');
  if (!panel) { render(); return; }
  const tmp = document.createElement('div');
  tmp.innerHTML = renderMCPConfig();
  panel.replaceWith(tmp.firstElementChild);
  if (_mcpExpanded) refreshMCPPanel();
}

function switchMCPTab(tab) {
  _mcpTab = tab;
  // Update tab active state instantly in DOM — no re-render needed
  document.querySelectorAll('#mcp-tabs .tab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === (tab === 'json' ? 'JSON 配置' : '字段配置'));
  });
  refreshMCPPanel();
}

function getMCPSseUrl() {
  const host = window.location.hostname || '139.196.25.63';
  return `http://${host}:8001/sse`;
}

function refreshMCPPanel() {
  const el = document.getElementById('mcp-panel-body');
  if (!el) return;
  if (_mcpTab === 'json') {
    el.innerHTML = `
      <div style="margin-bottom:12px">
        <label style="font-size:11.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px">服务名称 <span style="font-weight:400">(可自定义)</span></label>
        <input id="mcp-server-name" class="form-input" style="font-size:13px;padding:8px 12px;border-radius:10px"
          value="knowledge-mcp" oninput="updateMCPJson()">
      </div>
      <div style="font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px">粘贴到客户端配置文件</div>
      <div class="code-block" id="mcp-config-code" style="padding-right:72px;min-height:80px"></div>`;
    updateMCPJson();
  } else {
    const sseUrl = getMCPSseUrl();
    const fields = [
      { label: 'Type',     value: 'sse',        note: '连接类型' },
      { label: 'URL',      value: sseUrl,        note: 'MCP 服务端点（Cherry Studio / Cursor 等填此项）' },
    ];
    el.innerHTML = `
      <div style="background:var(--warn-light);border:1px solid rgba(181,133,11,.2);border-radius:11px;padding:10px 14px;margin-bottom:12px;font-size:12.5px;color:var(--warn)">
        ⚠ 使用前请确认服务器安全组已开放 <strong>8001</strong> 端口（TCP 入方向）
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${fields.map(f => `
          <div style="background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:10px 14px;display:flex;align-items:center;gap:10px;min-width:0">
            <div style="width:60px;flex-shrink:0;border-right:1px solid var(--line);padding-right:10px">
              <div style="font-size:12px;font-weight:700;color:var(--ink)">${f.label}</div>
              <div style="font-size:10.5px;color:var(--muted);margin-top:1px;line-height:1.35">${f.note}</div>
            </div>
            <code style="flex:1;min-width:0;font-size:12.5px;font-family:'SF Mono',Monaco,monospace;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(f.value)}">${esc(f.value)}</code>
            <button class="copy-btn" style="position:static;flex-shrink:0;margin-left:4px" onclick="copyText('${esc(f.value).replace(/'/g,"\\'")}'  ,this)">复制</button>
          </div>`).join('')}
      </div>`;
  }
}
function updateMCPJson() {
  const nameEl = document.getElementById('mcp-server-name');
  const codeEl = document.getElementById('mcp-config-code');
  if (!codeEl) return;
  const serverName = nameEl?.value.trim() || 'knowledge-mcp';
  const sseUrl = getMCPSseUrl();
  const cfg = JSON.stringify({ mcpServers: { [serverName]: { type: 'sse', url: sseUrl } } }, null, 2);
  codeEl.innerHTML = escCode(cfg) + '<button class="copy-btn" onclick="copyCode(\'mcp-config-code\',this)">复制</button>';
}

function copyCode(elId, btn) {
  const el = document.getElementById(elId);
  const text = el.innerText.replace(/复制$/, '').trim();
  navigator.clipboard.writeText(text).then(() => { _flashCopy(btn); });
}
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => { _flashCopy(btn); });
}
function _flashCopy(btn) {
  btn.textContent = '已复制 ✓'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
}

// ─── Main Render ──────────────────────────────────────────────────────

          <svg style="position:absolute;top:0;right:0;width:45%;height:100%;opacity:.6" viewBox="0 0 400 300" preserveAspectRatio="xMaxYMid slice"><path d="M200,0 C300,80 400,40 400,150 L400,0 Z" fill="#d4e3cc"/><path d="M300,300 C360,220 400,280 400,300 Z" fill="#dce8d4"/></svg>

function renderDetail(root) {
  const name = currentUser?.display_name || currentUser?.username || '';

      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:13px;font-weight:600;background:var(--accent-light);color:var(--accent);padding:6px 14px;border-radius:20px">👤 ${esc(name)}</div>

              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px">
                  <h1 style="font-size:22px;font-weight:700;margin:0">${esc(currentKB.name)}</h1>
                  <span class="badge badge-active">✓ 就绪</span>
                  <span style="font-size:12px;padding:3px 10px;border-radius:8px;background:var(--bg);color:var(--muted);font-weight:500;border:1px solid var(--line)">${esc(currentKB.domain)}</span>

                <div style="font-size:13.5px;color:var(--muted)">${esc(currentKB.description || '暂无简介')}</div>

function setMode(m) {
  queryMode = m;
  document.querySelectorAll('#mode-tabs .tab').forEach(t => t.classList.toggle('active', t.textContent === modeName(m)));
  const desc = document.getElementById('mode-desc');
  if (desc) desc.textContent = modeDesc(m);
}

function modeDesc(m) {
  return { hybrid:'综合局部与全局，适合大多数问题（推荐）', local:'深入相关文档片段，适合具体细节查询', global:'跨文档宏观推理，适合总结性问题', mix:'混合多种策略，覆盖更广', naive:'基础向量搜索，速度最快' }[m] || '';
}

function setupUpload() {
  const z = document.getElementById('upload-zone'), i = document.getElementById('file-input');
  if (!z || !i) return;
  i.addEventListener('change', e => { Array.from(e.target.files).forEach(uploadFile); e.target.value = ''; });
  z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('dragover'); });
  z.addEventListener('dragleave', () => z.classList.remove('dragover'));
  z.addEventListener('drop', e => { e.preventDefault(); z.classList.remove('dragover'); Array.from(e.dataTransfer.files).forEach(uploadFile); });
}

// ─── Utils ────────────────────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escCode(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(1) + ' KB'; return (b/1048576).toFixed(1) + ' MB'; }
function formatDate(s) { try { return new Date(s).toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); } catch { return s; } }
function statusText(s) { return { completed:'索引完成', processing:'构建中', queued:'排队中', failed:'处理失败', pending:'等待中' }[s] || s; }
function fileIcon(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  return { pdf:'📑', doc:'📝', docx:'📝', ppt:'📊', pptx:'📊', xls:'📈', xlsx:'📈', md:'📄', txt:'📄', csv:'📋', json:'🗂' }[ext] || '📄';
}
function modeName(m) { return { hybrid:'混合', local:'局部', global:'全局', mix:'融合', naive:'基础' }[m] || m; }

// ─── Init ─────────────────────────────────────────────────────────────
(async () => {
  if (token) { try { currentUser = await api('/user/me'); } catch { token = null; localStorage.removeItem('yz_token'); } }
  render();
})();
</script>
